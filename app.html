<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAC Protocol</title>
<link rel="icon" type="image/svg+xml" href="/branding/vac-logo-square-dark.png">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
    --bg: #0D0F17;
    --surface: #151821;
    --border: #1E2230;
    --teal: #2DD4BF;
    --purple: #7C3AED;
    --emerald: #10B981;
    --coral: #F96167;
    --white: #FFFFFF;
    --gray: #9CA3AF;
    --muted: #6B7280;
    --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
}
body { background: var(--bg); color: var(--white); font-family: -apple-system, sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

/* ═══ NAV BAR ═══ */
.nav {
    height: 48px;
    min-height: 48px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 0;
    z-index: 100;
}
.nav-brand {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-right: 20px;
    text-decoration: none;
    cursor: pointer;
}
.nav-brand img { width: 24px; height: 24px; }
.nav-brand-text {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 1.5px;
    white-space: nowrap;
}
.nav-brand-text .vac { color: var(--teal); }
.nav-brand-text .proto { color: var(--white); }

.nav-tabs { display: flex; height: 100%; gap: 0; }

.nav-tab {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.5px;
    color: var(--muted);
    padding: 0 14px;
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    text-decoration: none;
    height: 100%;
    white-space: nowrap;
    user-select: none;
}
.nav-tab:hover { color: var(--gray); }
.nav-tab.active { color: var(--teal); border-bottom-color: var(--teal); }

.nav-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
}

.nav-user {
    margin-left: auto;
    text-align: right;
    font-family: var(--mono);
    font-size: 10px;
    padding-right: 4px;
}
.nav-user-email { color: var(--gray); }
.nav-user-status { font-size: 9px; letter-spacing: 1px; font-weight: 700; }
.nav-user-status.verified { color: var(--emerald); }
.nav-user-status.authenticated { color: var(--teal); }
.nav-user-status.none { color: var(--muted); }

/* ═══ CONTENT ═══ */
.content {
    flex: 1;
    overflow: hidden;
}
.content iframe {
    width: 100%;
    height: 100%;
    border: none;
    background: var(--bg);
}
</style>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<nav class="nav">
    <a class="nav-brand" onclick="goTab('verify')">
        <img src="/branding/vac-logo-icon-dark.png" onerror="this.style.display='none'">
        <div class="nav-brand-text"><span class="vac">VAC</span> <span class="proto">PROTOCOL</span></div>
    </a>
    <div class="nav-tabs">
        <a class="nav-tab active" data-tab="dashboard" onclick="goTab('dashboard')">
            <div class="nav-dot" style="background:var(--teal)"></div>Dashboard
        </a>
        <a class="nav-tab" data-tab="verify" onclick="goTab('verify')">
            <div class="nav-dot" style="background:var(--emerald)"></div>Verify
        </a>
        <a class="nav-tab" data-tab="agents" onclick="goTab('agents')">
            <div class="nav-dot" style="background:var(--purple)"></div>Agents
        </a>
        <a class="nav-tab" data-tab="governance" onclick="goTab('governance')">
            <div class="nav-dot" style="background:var(--emerald)"></div>Governance
        </a>
        <a class="nav-tab" data-tab="admin" onclick="goTab('admin')">
            <div class="nav-dot" style="background:var(--coral)"></div>Admin
        </a>
    </div>
    <div class="nav-user">
        <div class="nav-user-email" id="userEmail"></div>
        <div class="nav-user-status none" id="userStatus">NOT VERIFIED</div>
    </div>
</nav>

<div class="content">
    <iframe id="appFrame" src="about:blank"></iframe>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const email = params.get('email') || '';
const tabs = {
    dashboard: '/dashboard' + (email ? '?email=' + encodeURIComponent(email) : ''),
    verify: '/auth' + (email ? '?email=' + encodeURIComponent(email) : ''),
    agents: '/agents' + (email ? '?email=' + encodeURIComponent(email) : ''),
    governance: '/groups' + (email ? '?email=' + encodeURIComponent(email) : ''),
    admin: '/admin'
};

// Set user display
if (email) {
    document.getElementById('userEmail').textContent = email;
}

// Check verification status
if (email) {
    fetch('https://vac-system-production.up.railway.app/v1/user/' + encodeURIComponent(email))
    .then(r => r.json())
    .then(d => {
        const user = d.user || d;
        const status = document.getElementById('userStatus');
        if (user && user.trust_score > 0) {
            status.textContent = 'VERIFIED ROOT';
            status.className = 'nav-user-status verified';
        } else if (user && user.name) {
            status.textContent = 'AUTHENTICATED';
            status.className = 'nav-user-status authenticated';
        }
    })
    .catch(() => {});
}

function goTab(tab) {
    // Update active tab
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
    
    // Load page in iframe
    const frame = document.getElementById('appFrame');
    const url = tabs[tab];
    if (frame.src !== window.location.origin + url) {
        frame.src = url;
    }
    
    // Update hash
    window.location.hash = tab;
}

// Listen for messages from child iframes
window.addEventListener('message', (e) => {
    if (e.data?.type === 'vac-auth-success') {
        const status = document.getElementById('userStatus');
        const emailEl = document.getElementById('userEmail');
        if (status) { status.textContent = 'AUTHENTICATED'; status.className = 'nav-user-status authenticated'; }
        if (emailEl && e.data.email) { emailEl.textContent = e.data.email; }
    }
    if (e.data?.type === 'vac-go-tab' && e.data.tab) {
        goTab(e.data.tab);
    }
    if (e.data?.type === 'vac-verified') {
        const status = document.getElementById('userStatus');
        if (status) { status.textContent = 'VERIFIED ROOT'; status.className = 'nav-user-status verified'; }
    }
});

// Load initial tab from hash or default to verify
const initTab = window.location.hash.replace('#', '') || 'dashboard';
if (tabs[initTab]) {
    goTab(initTab);
} else {
    goTab('verify');
}
</script>

</body>
</html>
